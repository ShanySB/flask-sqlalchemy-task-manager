{% extends "base.html" %}
{% block content %}

<h3 class="lighten-pink-2-text text-darken-4 center-align">Edit Task</h3>

<div class="row card-panel grey lighten-5">
    <form class="col s12" method="POST" action="{{ url_for('edit_task', task_id=task.id) }}"> 
      <!-- task_name -->
      <div class="row">
        <div class="input-field col s12">
          <i class="fas fa-pencil-alt prefix pink lighten-2 text-darken-4"></i>
          <input id="task_name" name="task_name" value="{{ task.task_name }}" minlength="5" maxlength="50" 
          type="text" class="validate" required>
          <label for="task_name" class="active">Task Name</label>
        </div>
      </div>
      <!-- task_description -->
      <div class="row">
        <div class="input-field col s12">
          <i class="fas fa-align-left prefix pink lighten-2 text-darken-4"></i>
          <textarea id="task_description" name="task_description" minlength="50" maxlength="200" 
            type="text" class="materialize-textarea validate" required>
            {{- task.task_description -}}
          </textarea>
          <label for="task_description" class="active">Task Description</label>
        </div>
      </div>
      <!-- due_date -->
      <div class="row">
        <div class="input-field col s12">
          <i class="fas fa-calendar-alt prefix pink lighten-2 text-darken-4"></i>
          <input id="due_date" name="due_date" type="text" value="{{ task.due_date.strftime('%d %B, %Y') }}" 
              class="datepicker validate" required>
          <label for="due_date" class="active">Due_Date </label>
        </div>
      </div>
      <!-- is_urgent-->
      <div class="row">
          <div class="input-field col s12">
            <div class="switch">
              <i class="fas fa-exclamation-circle prefix pink lighten-2 text-darken-4"></i>
              <label for="is_urgent">
                  {% if task.is_urgent == True %}
                      <input id="is_urgent" name="is_urgent" type="checkbox" checked>
                  {% else %}
                      <input id="is_urgent" name="is_urgent" type="checkbox">
                  {% endif %}
                  <span class="lever"></span>
              </label>
            </div>
          </div>
      </div>
      <!-- category_id -->
      <div class="row">
        <div class="input-field col s12">
          <i class="fas fa-pencil-alt prefix pink lighten-2 text-darken-4"></i>
          <select id="category_id" name="category_id" class="validate" required>
            <option value="" disabled>Choose Category</option>
            {% for category in categories %}
                {% if category == task.category %}
                    <option value="{{ category.id }}" selected>{{ category.category_name }}</option>
                {% else %}
                    <option value="{{ category.id }}">{{ category.category_name }}</option>
                {% endif %}
            {% endfor %}
          </select>
          <label for="category_id">Task Name</label>
        </div>
      </div>
      <!-- submit button -->
      <div class="row">
        <div class="col s12 center-align">
            <button type="submit" class="btn-large pink lighten-2 darken-4">
                Edit Task <i class="fas fa-edit right"></i>
            </button>
        </div>
      </div>
    </form>
  </div>

 <div class="row">
    {% for category in categories %}
    <div class="col s12 m6 l3">
      <div class="card pink lighten-2 center-align">
        <div class="card-content white-text">
          <span class="card-title">{{ category.category_name }}</span>
        </div>
        <div class="card-action">
          <a href="{{ url_for('edit_category', category_id=category.id) }}" class="btn green accent-3">Edit</a>
          <a href="{{ url_for('delete_category', category_id=category.id)}}" class="btn red">Delete</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

{% endblock %}
